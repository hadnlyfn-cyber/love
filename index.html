<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск по следам любви</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Экран с картинкой на весь экран и кнопкой -->
  <div id="startScreen" class="start-screen">
    <img src="your-photo.jpg" alt="Your photo" class="start-image"> <!-- Убедись, что фото называется так -->
    <button id="startBtn" class="start-btn">For My Love</button>
  </div>

  <!-- Экран с заданием и картинкой -->
  <div id="game" class="game" style="display: none;">
    <h2>Ты сидела на мне, ждав его. Найди меня!</h2>
    <img src="first.jpg" alt="First" class="game-image">
    <img src="second.png" alt="Second" class="clickable" id="clickableImage">
  </div>

  <script src="script.js"></script>
</body>
</html>
