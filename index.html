<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Terrain Map</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        #info { position: absolute; top: 20px; left: 20px; background: white; padding: 10px; border-radius: 5px; }
        #buttons { position: absolute; top: 60px; left: 20px; }
    </style>
</head>
<body>
    <canvas id="terrainCanvas"></canvas>
    <div id="info" style="display:none;"></div>
    <div id="buttons">
        <button id="showRoute">Show Route</button>
        <button id="reset">Reset</button>
    </div>
    <script>
        const canvas = document.getElementById('terrainCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const markers = [
            { x: 100, y: 100, info: 'Marker 1' },
            { x: 200, y: 150, info: 'Marker 2' },
            { x: 300, y: 200, info: 'Marker 3' },
            { x: 400, y: 250, info: 'Marker 4' },
            { x: 500, y: 300, info: 'Marker 5' },
        ];

        let showRoute = false;
        let routeProgress = 0;

        function drawTerrain() {
            // Example terrain drawing
            ctx.fillStyle = '#87CEEB'; // Sky
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#A52A2A'; // Land
            ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

            // Draw rounded markers
            markers.forEach(marker => {
                ctx.beginPath();
                ctx.arc(marker.x, marker.y, 10, 0, Math.PI * 2, true);
                ctx.fillStyle = 'gold';
                ctx.fill();
            });
        }

        drawTerrain();

        function drawRoute() {
            if (showRoute) {
                const startMarker = markers[0];
                const endMarker = markers[1]; // Example from first to second marker
                ctx.beginPath();
                ctx.setLineDash([5, 15]);
                ctx.moveTo(startMarker.x, startMarker.y);
                const endX = startMarker.x + (endMarker.x - startMarker.x) * (routeProgress / 100);
                const endY = startMarker.y + (endMarker.y - startMarker.y) * (routeProgress / 100);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = 'red';
                ctx.stroke();
                routeProgress += 1;
                if (routeProgress > 100) {
                    routeProgress = 0; // Reset progress
                    showRoute = false;
                }
                requestAnimationFrame(drawRoute);
            }
        }

        document.getElementById('showRoute').onclick = function() {
            showRoute = true;
            routeProgress = 0;
            drawRoute();
        };

        document.getElementById('reset').onclick = function() {
            routeProgress = 0;
            showRoute = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawTerrain();
        };

        markers.forEach(marker => {
            ctx.canvas.addEventListener('click', function(e) {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const dx = mouseX - marker.x;
                const dy = mouseY - marker.y;
                if (Math.sqrt(dx * dx + dy * dy) < 10) {
                    const infoDiv = document.getElementById('info');
                    infoDiv.style.display = 'block';
                    infoDiv.innerHTML = `<p>${marker.info}</p><button onclick='this.parentElement.style.display="none"'>Back</button>`;
                }
            });
        });
    </script>
</body>
</html>
