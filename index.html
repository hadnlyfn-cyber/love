<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Terrain Map</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        #info { position: absolute; top: 20px; left: 20px; background: white; padding: 10px; border-radius: 5px; }
        #buttons { position: absolute; top: 60px; left: 20px; }
        /* Slide overlay styles */
        #slideOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .slide {
            width: 80%;
            max-width: 900px;
            background: #f9f3ea;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .slide h2 { margin-top: 0; }
        .slide-controls { margin-top: 12px; display:flex; gap:8px; justify-content:flex-end }
        .marker-btn { cursor: pointer; border: none; background: transparent; font-weight: bold }
    </style>
</head>
<body>
    <canvas id="terrainCanvas"></canvas>
    <div id="info" style="display:none;"></div>
    <div id="buttons">
        <button id="showRoute">Show Route</button>
        <button id="reset">Reset</button>
    </div>
    <!-- Slide overlay shown when clicking a marker -->
    <div id="slideOverlay">
        <div class="slide" id="slideContent">
            <h2 id="slideTitle"></h2>
            <div id="slideBody"></div>
            <div class="slide-controls">
                <button id="prevSlide">Назад</button>
                <button id="nextSlide">Вперёд</button>
                <button id="closeSlide">Закрыть</button>
            </div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('terrainCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const markers = [
            { x: 100, y: 100, title: '1. Начало', slide: { title: 'Начало', body: '<p>Всё началось здесь — тёплые воспоминания.</p>' } },
            { x: 200, y: 150, title: '2. Встреча', slide: { title: 'Встреча', body: '<p>Тот самый день — первый наш разговор.</p>' } },
            { x: 300, y: 200, title: '3. Приключения', slide: { title: 'Приключения', body: '<p>Наши яркие моменты и совместные путешествия.</p>' } },
            { x: 400, y: 250, title: '4. Испытания', slide: { title: 'Испытания', body: '<p>Мы справлялись вместе — и это сделало нас сильнее.</p>' } },
            { x: 500, y: 300, title: '5. Будущее', slide: { title: 'Будущее', body: '<p>Вперёд к лучшему — планы и мечты.</p>' } },
        ];

        let showRoute = false;
        let routeProgress = 0;

        function drawTerrain() {
            // Example terrain drawing
            ctx.fillStyle = '#87CEEB'; // Sky
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#A52A2A'; // Land
            ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

            // Draw rounded markers
            markers.forEach(marker => {
                ctx.beginPath();
                ctx.arc(marker.x, marker.y, 10, 0, Math.PI * 2, true);
                ctx.fillStyle = 'gold';
                ctx.fill();
                // draw a small label number
                ctx.fillStyle = '#3b2f2f';
                ctx.font = '12px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const idx = markers.indexOf(marker) + 1;
                ctx.fillText(idx, marker.x, marker.y);
            });
        }

        drawTerrain();

        function drawRoute() {
            if (showRoute) {
                const startMarker = markers[0];
                const endMarker = markers[1]; // Example from first to second marker
                ctx.beginPath();
                ctx.setLineDash([5, 15]);
                ctx.moveTo(startMarker.x, startMarker.y);
                const endX = startMarker.x + (endMarker.x - startMarker.x) * (routeProgress / 100);
                const endY = startMarker.y + (endMarker.y - startMarker.y) * (routeProgress / 100);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = 'red';
                ctx.stroke();
                routeProgress += 1;
                if (routeProgress > 100) {
                    routeProgress = 0; // Reset progress
                    showRoute = false;
                }
                requestAnimationFrame(drawRoute);
            }
        }

        document.getElementById('showRoute').onclick = function() {
            showRoute = true;
            routeProgress = 0;
            drawRoute();
        };

        document.getElementById('reset').onclick = function() {
            routeProgress = 0;
            showRoute = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawTerrain();
        };

        let currentSlideIndex = 0;

        function showSlide(index) {
            currentSlideIndex = index;
            const marker = markers[index];
            document.getElementById('slideTitle').innerText = marker.slide.title;
            document.getElementById('slideBody').innerHTML = marker.slide.body;
            document.getElementById('slideOverlay').style.display = 'flex';
        }

        function closeSlide() {
            document.getElementById('slideOverlay').style.display = 'none';
        }

        document.getElementById('closeSlide').addEventListener('click', closeSlide);
        document.getElementById('prevSlide').addEventListener('click', function() {
            const idx = (currentSlideIndex - 1 + markers.length) % markers.length;
            showSlide(idx);
        });
        document.getElementById('nextSlide').addEventListener('click', function() {
            const idx = (currentSlideIndex + 1) % markers.length;
            showSlide(idx);
        });

        // click handler on canvas checks all markers
        ctx.canvas.addEventListener('click', function(e) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            for (let i = 0; i < markers.length; i++) {
                const marker = markers[i];
                const dx = mouseX - marker.x;
                const dy = mouseY - marker.y;
                if (Math.sqrt(dx * dx + dy * dy) < 12) {
                    showSlide(i);
                    return;
                }
            }
        });

        // keyboard navigation: Esc to close, arrows to navigate
        document.addEventListener('keydown', function(e) {
            if (document.getElementById('slideOverlay').style.display === 'flex') {
                if (e.key === 'Escape') closeSlide();
                if (e.key === 'ArrowLeft') document.getElementById('prevSlide').click();
                if (e.key === 'ArrowRight') document.getElementById('nextSlide').click();
            }
        });
    </script>
</body>
</html>
