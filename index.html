<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map — Метки</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        canvas { display: block; }
        #info { position: absolute; top: 20px; left: 20px; background: white; padding: 10px; border-radius: 5px; display:none; z-index:5; }
        #buttons { position: absolute; top: 60px; left: 20px; z-index:5; }
        /* Slide overlay styles */
        #slideOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .slide {
            width: 80%;
            max-width: 900px;
            background: #f9f3ea;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .slide h2 { margin-top: 0; }
        .slide-controls { margin-top: 12px; display:flex; gap:8px; justify-content:flex-end }
        button { cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="terrainCanvas"></canvas>
    <div id="info"></div>
    <div id="buttons">
        <button id="showRoute">Show Route</button>
        <button id="reset">Reset</button>
    </div>

    <!-- Slide overlay shown when clicking a marker -->
    <div id="slideOverlay">
        <div class="slide" id="slideContent">
            <h2 id="slideTitle"></h2>
            <div id="slideBody"></div>
            <div class="slide-controls">
                <button id="prevSlide">Назад</button>
                <button id="nextSlide">Вперёд</button>
                <button id="closeSlide">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('terrainCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawTerrain();
        }
        window.addEventListener('resize', resize);
        resize();

        const markers = [
            { x: 120, y: 160, title: '1. Начало', slide: { title: 'Начало', body: '<p>Всё началось здесь — тёплые воспоминания.</p>' } },
            { x: 420, y: 220, title: '2. Встреча', slide: { title: 'Встреча', body: '<p>Тот самый день — первый наш разговор.</p>' } },
            { x: 720, y: 300, title: '3. Приключения', slide: { title: 'Приключения', body: '<p>Наши яркие моменты и совместные путешествия.</p>' } },
            { x: 980, y: 420, title: '4. Испытания', slide: { title: 'Испытания', body: '<p>Мы справлялись вместе — и это сделало нас сильнее.</p>' } },
            { x: 600, y: 520, title: '5. Будущее', slide: { title: 'Будущее', body: '<p>Вперёд к лучшему — планы и мечты.</p>' } },
        ];

        let showRoute = false;
        let routeProgress = 0;

        function drawTerrain() {
            ctx.clearRect(0,0,canvas.width,canvas.height);

            // Simple background / terrain example
            ctx.fillStyle = '#0e2f44'; // water-ish top
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // land stripe
            ctx.fillStyle = '#50684a';
            ctx.fillRect(0, canvas.height * 0.35, canvas.width, canvas.height * 0.65);

            // draw markers
            markers.forEach((marker, i) => {
                ctx.beginPath();
                ctx.arc(marker.x, marker.y, 12, 0, Math.PI * 2, true);
                ctx.fillStyle = 'gold';
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#704b2b';
                ctx.stroke();

                // number
                ctx.fillStyle = '#3b2f2f';
                ctx.font = '12px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(String(i+1), marker.x, marker.y);
            });
        }

        drawTerrain();

        function drawRoute() {
            if (showRoute) {
                const startMarker = markers[0];
                const endMarker = markers[1];
                ctx.save();
                ctx.beginPath();
                ctx.setLineDash([8, 12]);
                ctx.moveTo(startMarker.x, startMarker.y);
                const endX = startMarker.x + (endMarker.x - startMarker.x) * (routeProgress / 100);
                const endY = startMarker.y + (endMarker.y - startMarker.y) * (routeProgress / 100);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = 'red';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.restore();

                routeProgress += 1;
                if (routeProgress > 100) {
                    routeProgress = 0;
                    showRoute = false;
                } else {
                    requestAnimationFrame(drawRoute);
                }
            }
        }

        document.getElementById('showRoute').onclick = function() {
            showRoute = true;
            routeProgress = 0;
            drawRoute();
        };

        document.getElementById('reset').onclick = function() {
            routeProgress = 0;
            showRoute = false;
            drawTerrain();
        };

        let currentSlideIndex = 0;

        function showSlide(index) {
            currentSlideIndex = index;
            const marker = markers[index];
            document.getElementById('slideTitle').innerText = marker.slide.title;
            document.getElementById('slideBody').innerHTML = marker.slide.body;
            document.getElementById('slideOverlay').style.display = 'flex';
        }

        function closeSlide() {
            document.getElementById('slideOverlay').style.display = 'none';
        }

        document.getElementById('closeSlide').addEventListener('click', closeSlide);
        document.getElementById('prevSlide').addEventListener('click', function() {
            const idx = (currentSlideIndex - 1 + markers.length) % markers.length;
            showSlide(idx);
        });
        document.getElementById('nextSlide').addEventListener('click', function() {
            const idx = (currentSlideIndex + 1) % markers.length;
            showSlide(idx);
        });

        // click handler on canvas checks all markers
        ctx.canvas.addEventListener('click', function(e) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            for (let i = 0; i < markers.length; i++) {
                const marker = markers[i];
                const dx = mouseX - marker.x;
                const dy = mouseY - marker.y;
                if (Math.sqrt(dx * dx + dy * dy) < 14) {
                    showSlide(i);
                    return;
                }
            }
        });

        // keyboard navigation: Esc to close, arrows to navigate
        document.addEventListener('keydown', function(e) {
            if (document.getElementById('slideOverlay').style.display === 'flex') {
                if (e.key === 'Escape') closeSlide();
                if (e.key === 'ArrowLeft') document.getElementById('prevSlide').click();
                if (e.key === 'ArrowRight') document.getElementById('nextSlide').click();
            }
        });
    </script>
</body>
</html>
