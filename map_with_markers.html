<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Интерактивная карта с метками</title>
  <style>
    :root{--bg:#f2e6cf;--ink:#3b2f2f;--gold:#d9b44a}
    html,body{height:100%;margin:0;font-family:Inter,Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#e9d8c5 0%, #f8efe0 100%);color:var(--ink)}
    .wrap{width:100%;max-width:1200px;margin:24px auto;padding:18px}
    h1{margin:0 0 12px;font-size:28px}
    .map-box{position:relative;border-radius:12px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.25);background:linear-gradient(180deg,#efe1c6,#e6d4b0)}
    svg{display:block;width:100%;height:auto}
    .marker{cursor:pointer}
    .marker circle{fill:var(--gold);stroke:#7a5630;stroke-width:3}
    .marker text{font-weight:700;fill:var(--ink);font-size:14px;text-anchor:middle;dominant-baseline:central}
    /* overlay slide */
    #overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.6);z-index:40}
    .slide{width:92%;max-width:820px;background:#fff8ee;padding:20px;border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,.4)}
    .slide h2{margin:0 0 8px}
    .slide .body{color:#333}
    .controls{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
    .btn{background:#7a5630;color:#fff;padding:6px 10px;border-radius:6px;border:none;cursor:pointer}
    .small{font-size:13px;padding:5px 8px}
    /* responsive */
    @media (max-width:600px){ .slide{padding:14px} .marker text{font-size:11px} }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Карта наших сокровищ (демо)</h1>
    <p>Нажмите на метку — откроется следующий слайд с описанием.</p>

    <div class="map-box" aria-hidden="false">
      <!-- Простая стилизованная карта в SVG -->
      <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Карта">
        <defs>
          <linearGradient id="sea" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#cfe8f3"/>
            <stop offset="100%" stop-color="#9ec0d6"/>
          </linearGradient>
          <linearGradient id="land" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#d6c49b"/>
            <stop offset="100%" stop-color="#b79f6a"/>
          </linearGradient>
        </defs>

        <!-- фон: море -->
        <rect x="0" y="0" width="1200" height="800" fill="url(#sea)" />

        <!-- остров, горы, река (упрощённо) -->
        <g id="island">
          <path d="M80,500 C140,420 230,380 320,400 C420,420 520,360 620,380 C700,395 840,360 980,460 C1060,510 1120,600 1120,700 L80,700 Z" fill="url(#land)" stroke="#8b6f42" stroke-width="3"/>
          <!-- немного рельефа -->
          <path d="M300,420 L350,330 L390,420 Z" fill="#9a7a4f" opacity="0.9"/>
          <path d="M540,390 L580,320 L620,390 Z" fill="#9a7a4f" opacity="0.9"/>
          <!-- река -->
          <path d="M700,380 C650,440 570,470 520,560 C470,650 420,680 320,700" stroke="#74b3d8" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.9"/>
        </g>

        <!-- декор: маяк, кораблик -->
        <g id="decor" opacity="0.95">
          <rect x="120" y="610" width="18" height="60" fill="#fff" stroke="#c49b6b"/>
          <path d="M80,120 C160,80 360,40 600,100" stroke="#fff" stroke-width="3" fill="none" opacity="0.6"/>
          <g transform="translate(100,80) scale(0.7)">
            <path d="M10 200 L60 170 L100 200 Z" fill="#7a5630"/>
          </g>
        </g>

        <!-- Маркеры: координаты в системе viewBox -->
        <g id="markers">
          <g class="marker" data-index="0" transform="translate(220,330)" tabindex="0">
            <circle r="20"></circle>
            <text>1</text>
          </g>
          <g class="marker" data-index="1" transform="translate(540,270)" tabindex="0">
            <circle r="20"></circle>
            <text>2</text>
          </g>
          <g class="marker" data-index="2" transform="translate(420,520)" tabindex="0">
            <circle r="20"></circle>
            <text>3</text>
          </g>
          <g class="marker" data-index="3" transform="translate(760,480)" tabindex="0">
            <circle r="20"></circle>
            <text>4</text>
          </g>
          <g class="marker" data-index="4" transform="translate(640,680)" tabindex="0">
            <circle r="20"></circle>
            <text>5</text>
          </g>
        </g>
      </svg>
    </div>
  </div>

  <!-- Overlay для слайдов -->
  <div id="overlay">
    <div class="slide" role="dialog" aria-modal="true">
      <h2 id="slideTitle">Заголовок</h2>
      <div class="body" id="slideBody">Текст</div>
      <div class="controls">
        <button class="btn small" id="prev">Назад</button>
        <button class="btn small" id="next">Вперёд</button>
        <button class="btn small" id="close">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    // Данные слайдов для маркеров
    const slides = [
      { title: 'Начало', body: '<p>Всё началось здесь: тёплые воспоминания и первые шаги.</p>' },
      { title: 'Встреча', body: '<p>Тот самый день, когда всё изменилось.</p>' },
      { title: 'Приключения', body: '<p>Яркие моменты и смелые решения.</p>' },
      { title: 'Испытания', body: '<p>Трудности, которые мы преодолели вместе.</p>' },
      { title: 'Будущее', body: '<p>Планы и мечты, которые ведут вперёд.</p>' }
    ];

    const overlay = document.getElementById('overlay');
    const slideTitle = document.getElementById('slideTitle');
    const slideBody = document.getElementById('slideBody');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const closeBtn = document.getElementById('close');

    let current = 0;

    function openSlide(i){
      current = i;
      const s = slides[i];
      slideTitle.innerText = s.title;
      slideBody.innerHTML = s.body;
      overlay.style.display = 'flex';
      // focus for accessibility
      closeBtn.focus();
    }

    function closeSlide(){ overlay.style.display = 'none'; }

    function prev(){ current = (current - 1 + slides.length) % slides.length; openSlide(current); }
    function next(){ current = (current + 1) % slides.length; openSlide(current); }

    // назначаем клики по маркерам
    document.querySelectorAll('.marker').forEach(g => {
      g.addEventListener('click', () => openSlide(parseInt(g.dataset.index,10)));
      g.addEventListener('keydown', (e)=>{ if(e.key==='Enter' || e.key===' ') openSlide(parseInt(g.dataset.index,10)); });
    });

    prevBtn.addEventListener('click', prev);
    nextBtn.addEventListener('click', next);
    closeBtn.addEventListener('click', closeSlide);

    // клавиши
    document.addEventListener('keydown', (e)=>{
      if(overlay.style.display === 'flex'){
        if(e.key==='Escape') closeSlide();
        if(e.key==='ArrowLeft') prev();
        if(e.key==='ArrowRight') next();
      }
    });

    // клик вне слайда закрывает
    overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeSlide(); });
  </script>
</body>
</html>
